project:
  type: website
  output-dir: _site
  render:
    - "*.md"
    - "!README.md"

website:
  title: "YelmoX"
  description: "Documentation for the YelmoX ice-sheet modelling framework"
  repo-url: https://github.com/fesmc/yelmox
  repo-actions: [edit, issue]
  page-navigation: true
  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.md
      - text: "Flavors"
        menu:
          - text: "Overview"
            href: flavors.md
          - text: "yelmox (single-domain)"
            href: flavor-yelmox.md
          - text: "yelmox_bipolar"
            href: flavor-bipolar.md
          - text: "yelmox_esm"
            href: flavor-esm.md
          - text: "yelmox_rembo"
            href: flavor-rembo.md
      - text: "Database namelists"
        href: database-namelists.md
      - text: "Multigrid design"
        href: multigrid.md

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    html-math-method: katex
    link-external-newwindow: true
